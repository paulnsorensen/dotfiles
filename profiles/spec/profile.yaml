# spec — discovery dialogue (ccp parity).
# Research-heavy: AST scan, library feasibility, technical web research.
# NotebookEdit denied (spec work doesn't touch notebooks).
name: spec
description: Discovery dialogue — research-heavy
isolated: true
system_prompt: CLAUDE.md
permissions_deny:
  - NotebookEdit
mcps:
  - name: tilth
    command: tilth
    args: ["--mcp", "--edit"]
  - name: context7
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    env:
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
  - name: tavily
    command: npx
    args: ["-y", "tavily-mcp@latest"]
    env:
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
