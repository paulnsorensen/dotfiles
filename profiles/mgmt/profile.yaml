# mgmt — management / planning session (ccp parity).
# Closed-world planning surface: Notion docs, the repo wiki (hallouminate),
# and Linear tickets. GitHub planning (issues / projects / PRs) is handled by
# the `gh` CLI + /gh skill via Bash, which works even inside this isolated
# world — no GitHub MCP needed.
name: mgmt
description: Management/planning — Notion + wiki + Linear (github via gh CLI)
# Cheese sub-agents are available in this closed world too
# (agents are orthogonal to the MCP/skill scope below).
registries:
  agents: agents/registry.yaml
isolated: true
system_prompt: CLAUDE.md
# Auto-approve the profile's own remote MCPs (ccp settings-merge parity).
permissions_allow:
  - "mcp__notion__*"
  - "mcp__hallouminate__*"
  - "mcp__linear__*"
mcps:
  - name: notion
    type: http
    url: https://mcp.notion.com/mcp
  - name: linear
    type: http
    url: https://mcp.linear.app/mcp
  - name: hallouminate
    command: hallouminate
    args: ["serve"]
