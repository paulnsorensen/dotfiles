# Rust profile — example of a language-specific profile that composes
# the base profile and adds a rust-reviewer subagent, a /clippy command,
# and a pre-bash cargo-check hook.
#
# Drop this whole tree into <repo>/.agent-profiles/rust/ for a per-repo
# variant, or use the global one from $DOTFILES_DIR/profiles/rust/.

name: rust
description: Rust toolchain conventions, clippy command, idiomatic reviewer
include:
  - base

agents:
  - name: rust-reviewer
    description: Reviews Rust code for idiomatic patterns, lifetimes, and clippy-clean style.
    tools: [Read, Grep, Glob, Bash]
    body_path: agents/rust-reviewer.md

skills:
  - name: cargo-workflow
    path: skills/cargo-workflow

commands:
  - name: clippy
    description: Run cargo clippy and propose fixes
    body_path: commands/clippy.md

hooks:
  - event: PreToolUse
    matcher: "Bash"
    script: hooks/cargo-check.sh
    harnesses: [claude]   # opt-in per harness; default = claude only

settings:
  permissions_allow:
    - "Bash(cargo:*)"
    - "Bash(rustc:*)"
    - "Bash(rustup:*)"
