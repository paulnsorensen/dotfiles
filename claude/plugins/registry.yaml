# Plugin Registry - Source of truth for Claude Code plugins
#
# Format: <plugin>@<marketplace>
# Marketplaces:
#   - claude-code-lsps: Language server plugins
#   - claude-plugins-official: Official workflow plugins
#
# Usage:
#   plugin-sync           Sync plugins (install missing)
#   plugin-sync-dry       Preview changes
#   plugin-ls             List installed plugins

plugins:
  # --- LSP plugins (globally enabled, servers start lazily per file type) ---
  bash-language-server@claude-code-lsps:
    description: Bash/shell script language server (.sh, .bash, .zsh)
    scope: user
    load: true

  vtsls@claude-code-lsps:
    description: TypeScript/JavaScript language server (.ts, .tsx, .js, .jsx)
    scope: user
    load: true

  yaml-language-server@claude-code-lsps:
    description: YAML language server (.yaml, .yml)
    scope: user
    load: true

  rust-analyzer@claude-code-lsps:
    description: Rust language server (.rs)
    scope: user
    load: true

  pyright@claude-code-lsps:
    description: Python type checking and language server (.py, .pyi)
    scope: user
    load: true

  gopls@claude-code-lsps:
    description: Go language server (.go)
    scope: user
    load: true

  # --- Workflow plugins ---
  claude-md-management@claude-plugins-official:
    description: Audit, maintain, and improve CLAUDE.md files with session learnings
    scope: user
    load: true

  playwright@claude-plugins-official:
    description: Browser testing and automation with Playwright
    scope: user
    load: true

  frontend-design@claude-plugins-official:
    description: Frontend design skill for UI/UX implementation
    scope: user
    load: true

  plugin-dev@claude-plugins-official:
    description: Plugin development toolkit for building and testing Claude Code plugins
    scope: user
    load: true

  skill-creator@claude-plugins-official:
    description: Guided skill creation workflow with component design, implementation, and validation
    scope: user
    load: true

  claude-hud@claude-hud:
    description: Real-time statusline HUD — context usage, rate limits, active tools, agents, tasks
    scope: user
    load: true

  # --- Local plugins (dotfiles) ---

  cheese-flow@cheese-flow:
    description: Cheddar Flow agent pipeline — cheese-themed development workflow tools
    scope: user
    load: true
    path: claude/plugins/local/cheese-flow

  todoist-flow@todoist-flow:
    description: Todoist productivity suite — triage, organize, update, extract reference material
    scope: user
    load: true
    path: claude/plugins/local/todoist-flow

  # --- Local plugins ---
  vaudeville@local:
    description: SLM-powered semantic hook enforcement via local Phi-3-mini
    scope: user
    load: true

