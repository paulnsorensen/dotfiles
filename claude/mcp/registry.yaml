# MCP Registry - Source of truth for Claude Code MCP servers
# Run `mcp-sync` to sync this to your Claude Code installation
#
# Scopes:
#   user    - Available in all projects (recommended for dev tools)
#   project - Stored in .mcp.json, shared with team
#   local   - Machine-specific, gitignored

mcps:
  # context7, tavily, tilth — provided by the cheese-flow plugin's .mcp.json
  # (~/Dev/cheese-flow/.mcp.json). Plugin MCPs are session-wide and accessible
  # to all skills/agents. Registering them here too would spawn duplicate
  # processes per session.

  # shadcn lives in the FE profile only — see claude/profiles/fe/mcp-add.json.
  # Installing user-scope loads its tool schemas in every session even though
  # shadcn is only useful for FE work.

  serper:
    command: npx
    args: ["-y", "serper-search-scrape-mcp-server"]
    env:
      SERPER_API_KEY: "${SERPER_API_KEY}"
    scope: user
    description: Google SERP data via Serper.dev — web search, Knowledge Graph, People Also Ask, and page scraping

  todoist:
    command: npx
    args: ["-y", "@doist/todoist-ai"]
    env:
      TODOIST_API_KEY: "${TODOIST_API_KEY}"
    scope: user
    description: Official Todoist MCP (Doist-maintained) — invoke only when explicitly requested

  code-review-graph:
    command: uvx
    args: [code-review-graph, serve]
    scope: user
    description: Structural code knowledge graph via Tree-sitter — semantic search, call chains, impact radius, flows, communities
