# MCP Registry - Source of truth for Claude Code MCP servers
# Run `mcp-sync` to sync this to your Claude Code installation
#
# Scopes:
#   user    - Available in all projects (recommended for dev tools)
#   project - Stored in .mcp.json, shared with team
#   local   - Machine-specific, gitignored

mcps:
  octocode:
    command: npx
    args: [octocode-mcp@latest]
    scope: user
    description: GitHub code search and repository tools

  context7:
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    env:
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
    scope: user
    description: Documentation context for libraries and frameworks

  shadcn:
    command: npx
    args: [shadcn@latest, mcp]
    scope: user
    description: Browse and install shadcn/ui components via natural language

  tavily:
    command: npx
    args: ["-y", "tavily-mcp@latest"]
    env:
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
    scope: user
    description: Web search and research via Tavily AI search API

  serper:
    command: npx
    args: ["-y", "serper-search-scrape-mcp-server"]
    env:
      SERPER_API_KEY: "${SERPER_API_KEY}"
    scope: user
    description: Google SERP data via Serper.dev — web search, Knowledge Graph, People Also Ask, and page scraping

  todoist:
    command: npx
    args: ["-y", "@doist/todoist-ai"]
    env:
      TODOIST_API_KEY: "${TODOIST_API_KEY}"
    scope: user
    description: Official Todoist MCP (Doist-maintained) — invoke only when explicitly requested
