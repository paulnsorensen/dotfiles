# MCP scope for the `todo` profile.
# Each entry must be a key in claude/mcp/registry.yaml.
#
# Rationale: Productivity flow is the primary purpose, but /research is
# useful when a task requires a fact-check or library doc lookup before
# it can be scoped. Context7, Tavily, and Serper back the /research skill;
# Todoist remains the core. No tilth/code-review-graph — this is not a
# coding session.
mcps:
  - todoist
  - context7
  - tavily
  - serper
