# packages.yaml — flat package registry
#
# Bare string = brew (mac) / apt (linux)
# Key-value = override defaults
#
#   source:   brew (default) | cask | tap | cargo | npm | uv
#   dev:      only when DOTFILES_DEV=true
#   apt:      override name for linux
#   platform: mac | linux (default: both)

packages:
  - tinted-theming/tinted: { source: tap }

  # Core CLI
  - jq
  - yq
  - fzf
  - gh
  - shellcheck
  - tree
  - htop
  - ripgrep
  - fd: { apt: fd-find }
  - eza
  - bat
  - ast-grep
  - git-delta
  - tmux
  - tinty
  - prek
  - starship
  - zellij
  - zoxide
  - atuin
  - bottom
  - dust
  - procs
  - tokei
  - yazi
  - difftastic
  - mergiraf
  - lazygit
  - just
  - duckdb
  - watch
  - node: { apt: nodejs }
  - sd
  - vhs
  - gettext
  - taf2/tap/mdvi

  # macOS-only
  - mas: { platform: mac }                    # Mac App Store CLI
  - trash: { platform: mac }                  # Move to Trash (safer rm)
  - terminal-notifier: { platform: mac }      # macOS notifications from terminal

  # Linux-only
  - xclip: { platform: linux }

  # Dev (DOTFILES_DEV=true)
  - pyenv: { dev: true }
  - uv: { dev: true }
  - rustup: { dev: true }
  - docker: { source: cask, dev: true, platform: mac }
  - npm: { platform: linux, dev: true }       # On mac, npm comes with `brew install node`

  # LSP servers (for Claude Code LSP plugins)
  - bash-language-server
  - yaml-language-server
  - pyright
  - gopls: { dev: true }
  - rust-analyzer
  - vtsls: { source: npm, pkg: "@vtsls/language-server" }

  # Linters
  - eslint: { source: npm, pkg: "eslint@8" }
  - markdownlint-cli2: { source: npm }

  # uv tools (Python)
  - ralphify: { source: uv }
  - code-review-graph: { source: uv }

  # Cargo
  - cargo-llvm-cov: { source: cargo }
  - tilth: { source: cargo }
  - qdrant: { source: cargo, dev: true }
