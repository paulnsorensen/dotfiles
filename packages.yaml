# packages.yaml — flat package registry
#
# Bare string = brew (mac) / apt (linux), same name
# Map overrides: source, dev, apt, platform, git
#
#   source:   brew (default) | cask | tap | cargo
#   dev:      only when DOTFILES_DEV=true
#   apt:      override name for linux (e.g. fd -> fd-find)
#   platform: mac | linux (default: both)

packages:
  - { name: tinted-theming/tinted, source: tap }

  # Core CLI
  - jq
  - yq
  - fzf
  - gh
  - shellcheck
  - tree
  - htop
  - ripgrep
  - { name: fd, apt: fd-find }
  - eza
  - bat
  - ast-grep
  - git-delta
  - tmux
  - tinty
  - prek
  - starship
  - zellij
  - zoxide
  - atuin
  - bottom
  - dust
  - procs
  - tokei
  - yazi
  - lazygit
  - sd
  - vhs

  # Linux-only
  - { name: xclip, platform: linux }

  # Dev (DOTFILES_DEV=true)
  - { name: pyenv, dev: true }
  - { name: node, dev: true, apt: nodejs }
  - { name: uv, dev: true }
  - { name: rustup, dev: true }
  - { name: sccache, dev: true }
  - { name: docker, source: cask, dev: true }
  - { name: npm, platform: linux, dev: true }

  # Cargo
  - name: lspmux
    source: cargo
    git: https://codeberg.org/p2502/lspmux.git
