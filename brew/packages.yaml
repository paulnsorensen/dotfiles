# Homebrew Packages
# Run `dots sync` or `.brew` to install

# Third-party taps
taps:
  - tinted-theming/tinted  # tinty theme manager

# Core CLI tools (always installed)
formulae:
  - jq           # JSON processing
  - yq           # YAML processing (for MCP sync)
  - fzf          # Fuzzy finder
  - gh           # GitHub CLI
  - shellcheck   # Shell script linter
  - tree         # Directory tree view
  - htop         # Process viewer
  - ripgrep      # Fast grep (rg)
  - fd           # Fast find
  - eza          # Modern ls replacement
  - bat          # Cat clone with syntax highlighting
  - ast-grep     # AST-based code search
  - delta        # Syntax-aware diff tool
  - tmux         # Terminal multiplexer
  - tinty        # Base16/Base24 theme manager
  - prek         # Pre-commit hook manager

  # Modern terminal tools
  - starship     # Cross-shell prompt
  - zellij       # Terminal multiplexer (tmux alternative)
  - zoxide       # Smarter cd with frecency ranking
  - atuin        # Shell history with search and sync
  - bottom       # System resource monitor (btm)
  - dust         # Intuitive disk usage (du alternative)
  - procs        # Modern process viewer (ps alternative)
  - tokei        # Code statistics by language
  - yazi         # Terminal file manager
  - sd           # Intuitive find-and-replace (sed alternative)
  - vhs          # Terminal session recorder (GIF/MP4)

# Development tools (installed when DOTFILES_DEV=true)
dev_formulae:
  - pyenv        # Python version management
  - node         # Node.js
  - uv           # Fast Python package manager
  - rustup       # Rust toolchain manager

dev_casks:
  - docker       # Docker Desktop

# Optional casks (uncomment to install)
