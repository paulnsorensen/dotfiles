name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Install ruff
      uses: astral-sh/setup-ruff@v1

    - name: Install Node linters
      run: npm install -g eslint@8 markdownlint-cli2

    - name: Run linters
      run: just lint

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install bats
      run: sudo npm install -g bats

    - name: Install hook dependencies
      run: cd claude/hooks && npm install

    - name: Install prek
      uses: j178/prek-action@v1
      with:
        install-only: true

    - name: Run tests
      run: just test
