name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Install ruff
      uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3.6.1
      with:
        args: "--version"

    - name: Install Node linters
      run: npm install -g eslint@8 markdownlint-cli2

    - name: Run linters
      run: just lint

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0

    - name: Install bats
      run: sudo npm install -g bats

    - name: Install hook dependencies
      run: cd claude/hooks && npm install

    - name: Install prek
      uses: j178/prek-action@0bb87d7f00b0c99306c8bcb8b8beba1eb581c037 # v1.1.1
      with:
        install-only: true

    - name: Run tests
      run: just test
