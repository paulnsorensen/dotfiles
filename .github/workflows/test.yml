name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0

    - name: Install shellcheck
      run: sudo apt-get install -y shellcheck

    - name: Install ruff
      uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
      with:
        args: "--version"

    - name: Install Node linters
      run: npm install -g eslint@8 markdownlint-cli2

    - name: Run linters
      run: just lint

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0

    - name: Install bats
      run: sudo npm install -g bats

    - name: Install hook dependencies
      run: cd claude/hooks && npm install

    - name: Install prek
      uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3 # v2.0.3
      with:
        install-only: true

    - name: Run tests
      run: just test
