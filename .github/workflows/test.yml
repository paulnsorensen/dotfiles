name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install bats
      run: |
        sudo npm install -g bats

    - name: Install hook dependencies
      run: |
        cd claude/hooks && npm install

    - name: Install prek
      uses: j178/prek-action@v1
      with:
        install-only: true

    - name: Run tests
      run: ./tests/run-tests.sh

  shellcheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@2.0.0
      with:
        scandir: './bin'
        additional_files: '.sync .sync-with-rollback'
        ignore_paths: './tests'
        format: gcc
