# oh-my-pi registry — single source of truth for global ~/.omp/agent/
# config.yml AND models.yml.
#
# Auto-loaded by chezmoi into template data as `.omp.*` (.chezmoidata).
# Edit here, then `dots sync`. The managed keys under `config` are authored
# WHOLESALE into ~/.omp/agent/config.yml by dot_omp/private_agent/modify_config.yml
# on every apply — live drift on a managed key (an in-app symbolPreset toggle,
# a hand-edited disabledProviders list) is WIPED. Promote anything worth keeping
# into this file, then `dots sync`.
#
# The `models` subtree is authored WHOLESALE into ~/.omp/agent/models.yml by
# dot_omp/private_agent/models.yml.tmpl (a plain template — models.yml has no
# machine-state key to preserve). Same drift rule: hand-edits to the live
# models.yml are WIPED on apply. See the `models:` block below for the local-llm
# provider notes.
#
# `setupVersion` is machine state, not config: the modify_ script preserves it
# from the live file and never authors it here.
#
# Keep external discovery shut off while leaving OMP-native sources on. Each
# id below is a non-OMP discovery provider that can import another harness'
# agent config, MCP servers, commands, skills, hooks, prompts, tools, or
# settings. Native OMP plugin discovery stays enabled; plugin-owned MCPs
# therefore must NOT also be listed in dot_omp/private_agent/mcp.json, or OMP
# exposes both `server` and `plugin:server` namespaces. `github` here is the
# GitHub/Copilot discovery source; it is separate from the OMP `github.enabled`
# integration flag below.
#
# Gotcha — array settings REPLACE, they don't merge across omp config layers.
# A project-level .omp/config.yml that sets its own `disabledProviders` list
# replaces this global one wholesale and can silently re-enable external
# discovery. Check every active layer if non-native discovery reappears.

omp:
  config:
    symbolPreset: nerd
    colorBlindMode: true
    theme:
      dark: chocolate-donut
      light: light
    defaultThinkingLevel: auto
    # OpenAI Responses/Codex-only knob: the model's own prose verbosity
    # (low/medium/high). Default `high` is chatty; `medium` tightens Codex
    # output without going terse.
    textVerbosity: medium
    disabledProviders:
      - claude
      - codex
      - cursor
      - gemini
      - github
      - opencode
      - agents-md
    display:
      showTokenUsage: true
      cacheMissMarker: true
    includeWorkspaceTree: true
    # Output tightening (2026-07-09 research: .cheese/research/oh-my-pi-config).
    # artifactSpillThreshold (KB): tool output larger than this spills to a
    # head/tail artifact preview instead of printing in full. Default 50 renders
    # whole SKILL.md bodies verbatim on screen; 2 spills them. NOTE: this does
    # NOT shrink skills invoked via `/skill:<name>` — that path injects the body
    # as a message with no documented spill knob (docs/skills.md).
    tools:
      artifactSpillThreshold: 2
    tui:
      tight: true
    startup:
      quiet: true
    advisor:
      enabled: false
    compaction:
      thresholdTokens: 120000
    lsp:
      formatOnWrite: true
    github:
      enabled: true
    task:
      eager: default
    # Consent answer omp recorded live (autoqa prompt) — promoted to survive
    # the wholesale re-author.
    dev:
      autoqa:
        consent: granted
    # Reasoning goes to the interactive session (default) and the reasoning
    # roles (plan/slow). Delegation/dispatch roles that "just do work" —
    # smol/tiny/task/commit — stay on cheap/no-reasoning models so subagent
    # fan-out and commit-message generation never ride the reasoning cost.
    # `task` in particular inherits the active session model unless pinned.
    modelRoles:
      default: openai-codex/gpt-5.5:medium
      smol: openai-codex/gpt-5.4-mini
      plan: openai-codex/gpt-5.5:xhigh
      advisor: openai-codex/gpt-5.5
      tiny: openai-codex/gpt-5.4-nano
      slow: openai-codex/gpt-5.5:xhigh
      task: openai-codex/gpt-5.4-mini
      commit: openai-codex/gpt-5.4-mini
      vision: openai-codex/gpt-5.4
  # Local LLM stack — LiteLLM proxy front (~/local-llm), OpenAI-compatible.
  # Keyless: the proxy sets no master_key, so no Authorization header is sent.
  # contextWindow per model matches the backend's launched --ctx-size in
  # ~/local-llm/configs/llama-swap.yaml — do not inflate, or requests overflow
  # the real llama.cpp n_ctx and fail.
  models:
    providers:
      local-llm:
        baseUrl: http://127.0.0.1:4000/v1
        api: openai-completions
        auth: none
        models:
          - id: local-haiku
            name: Local Haiku (Qwen3-8B, CPU, hot)
            reasoning: false
            input: [text]
            contextWindow: 16384
            maxTokens: 4096
          - id: local-sonnet
            name: Local Sonnet (Qwen3-30B-A3B, iGPU, swap)
            reasoning: false
            input: [text]
            contextWindow: 32768
            maxTokens: 8192
          - id: local-coder
            name: Local Coder (Qwen3-Coder-30B-A3B, iGPU, swap)
            reasoning: false
            input: [text]
            contextWindow: 32768
            maxTokens: 8192
          - id: local-vision
            name: Local Vision (Qwen3-VL-8B, CPU, swap)
            reasoning: false
            input: [text, image]
            contextWindow: 8192
            maxTokens: 2048
