# Hook Registry — Source of truth for harness-agnostic coding-agent hooks.
# Run `hook-sync` (or `dots sync`) to apply this to every installed harness.
#
# Per-entry fields:
#   event          — one of SessionStart, UserPromptSubmit, PreToolUse,
#                    PostToolUse, Stop, PermissionRequest. The active set
#                    lives in HOOK_EVENTS_VALID inside lib.sh;
#                    hook_filter_for_harness fails loud on anything else
#                    (catches typos like "evnt: PostToolUse").
#                    PermissionRequest is claude-only — codex never fires it.
#   script         — repo-relative path to the hook script (deployed per
#                    harness into $HOME/.<harness>/hooks/<basename>).
#                    Mutually exclusive with `command` — set exactly one.
#   command        — literal command string, used verbatim with no file
#                    deploy (e.g. an external binary like moshi-hook).
#                    Mutually exclusive with `script` — set exactly one.
#   shared_assets  — optional list of repo-relative paths to data files the
#                    hook script reads at runtime (libs, banks, …). Each
#                    asset path must live under agents/<subdir>/<file> and
#                    is deployed to $HOME/.<harness>/<subdir>/<file>. The
#                    chezmoi installer derives its copy list from this
#                    field, so adding a new hook is purely a registry edit.
#   harnesses      — list of harness names to install into;
#                    default: [claude, codex]
#                    crush is opt-in per hook and only meaningful for
#                    PreToolUse entries (Crush has no SessionStart event)
#   matcher        — event-dependent. The (event, harness) pairs that
#                    actually write a matcher field into the outer block
#                    are encoded in _hook_event_uses_matcher (lib.sh):
#                      SessionStart   — codex only (source regex:
#                                        startup|resume|clear). Claude
#                                        ignores; matcher is dropped on
#                                        write.
#                      PreToolUse,    — both harnesses (tool-name regex).
#                      PostToolUse
#                      UserPromptSubmit, Stop — neither harness writes
#                                        matcher; the field is dropped on
#                                        write but kept in the registry
#                                        for documentation if set.
#   timeout        — seconds (verified against
#                    developers.openai.com/codex/hooks → "timeout is in
#                    seconds"; Claude uses the same unit)
#   async          — claude-only boolean. true → Claude fires the hook
#                    without blocking the turn; false → synchronous. An
#                    explicit `false` is preserved on write (it is not the
#                    same as an absent field). Codex ignores it.
#   description    — human-readable purpose
hooks:
  session-start-cheese-flair:
    event: SessionStart
    script: agents/hooks/session-start-cheese-flair.sh
    shared_assets:
      - agents/lib/cheese-flair.sh
      - agents/reference/cheese-flair.md
    harnesses: [claude, codex]
    matcher: "startup|resume"
    timeout: 5
    description: Rotating cheese flair sample injected at session start

  # ─── Destructive-git protection ─────────────────────────────────────
  # Blocks destructive git ops that silently discard uncommitted work —
  # `git checkout -- <path>` / `git checkout .` / `git checkout -f`,
  # `git restore <path>`, `git reset --hard`, `git clean -f` — but ONLY when
  # the targeted paths actually have uncommitted changes (clean tree → never
  # nags). The script dispatches on tool_name == Bash, so the matcher is just
  # the shell tool, which is `Bash` for both Claude and Codex.
  # Both harnesses share the identical PreToolUse deny schema
  # (hookSpecificOutput.permissionDecision: "deny") and route shell through
  # `tool_input.command` — one script serves both (verified against
  # developers.openai.com/codex/hooks). Cursor + Copilot are covered
  # separately (different mechanisms): a Cursor beforeShellExecution hook in
  # cursor/plugins/local/cheese-grok, and a Copilot preToolUse hook under
  # chezmoi/private_dot_copilot/hooks. opencode has no shell-command hook, so
  # it is N/A (see AGENTS.md → Hook Management).
  git-guard:
    event: PreToolUse
    script: agents/hooks/git-guard.sh
    shared_assets:
      - agents/lib/git-guard.js
    harnesses: [claude, codex]
    matcher: "Bash"
    timeout: 5
    description: Block destructive git ops against a dirty working tree

  # ─── Secret protection ──────────────────────────────────────────────
  # Blocks reads, writes, and shell access to .env files, private keys, and
  # credential stores. One entry; the script dispatches on tool_name, so the
  # matcher unions every tool that can touch a file across both harnesses:
  #   claude — Read / Edit / Write / MultiEdit / Bash / tilth MCP
  #   codex  — Bash / apply_patch (file edits) / tilth MCP
  # Both harnesses share the identical PreToolUse deny schema
  # (hookSpecificOutput.permissionDecision: "deny"), so one script serves
  # both — verified against developers.openai.com/codex/hooks.
  # Cursor + opencode are covered separately (different mechanisms): a Cursor
  # hook in cursor/plugins/local/cheese-grok, and opencode's declarative
  # permission config in chezmoi/dot_config/opencode/create_opencode.json.
  sensitive-file-guard:
    event: PreToolUse
    script: agents/hooks/sensitive-file-guard.sh
    shared_assets:
      - agents/lib/sensitive-file-guard.js
    harnesses: [claude, codex]
    matcher: "Read|Edit|Write|MultiEdit|Bash|apply_patch|mcp__tilth__tilth_read|mcp__tilth__tilth_write"
    timeout: 5
    description: Block reads/writes of .env, private keys, and credential stores

  # ─── Moshi (rjyo/moshi-hook) ────────────────────────────────────────
  # Bridge between Claude Code and the Moshi iOS terminal app — sends
  # session-start, prompt, turn-end, and approval events to the phone
  # so the user can babysit the agent remotely.
  #
  # Bare `moshi-hook`, resolved from PATH at hook time. The binary lives at
  # ~/.local/bin (Moshi's own installer, linux) or /opt/homebrew/bin (brew
  # via packages.yaml, macOS). Never hardcode a machine-specific absolute
  # path here — the original wire format captured from `moshi-hook install`
  # on linux broke every Claude session on macOS (issue #263).
  # claude-only: codex bridge ships via ~/.codex/hooks.json (different
  # surface), out of scope here.
  moshi-session-start:
    event: SessionStart
    command: "moshi-hook claude-hook"
    async: true
    harnesses: [claude]
    description: Moshi bridge — session-start notification to phone

  moshi-user-prompt-submit:
    event: UserPromptSubmit
    command: "moshi-hook claude-hook"
    async: true
    harnesses: [claude]
    description: Moshi bridge — prompt-submit notification to phone

  moshi-stop:
    event: Stop
    command: "moshi-hook claude-hook"
    async: true
    harnesses: [claude]
    description: Moshi bridge — turn-end notification to phone

  moshi-permission-request:
    event: PermissionRequest
    command: "moshi-hook claude-hook"
    async: false
    timeout: 300
    harnesses: [claude]
    description: Moshi bridge — approval request (synchronous, 5-min phone reach)
