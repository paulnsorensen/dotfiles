# MCP Registry - Source of truth for coding-agent MCP servers
# Run `mcp-sync` (or `dots sync`) to apply this to every installed harness.
#
# Per-entry fields:
#   command      — stdio launcher (required)
#   args         — array of arg strings
#   env          — env vars; values can reference shell vars via "${VAR}"
#   scope        — claude-only: user | project | local (default user)
#   harnesses    — list of harness names to install into; default: [claude, codex, opencode]
#   gate_unless  — claude-only: skip install when env var == "true" (defer to a plugin's bundled MCP)
#   description  — human-readable purpose

mcps:
  # context7, tavily — provided by the cheese-flow plugin's .mcp.json when
  # CHEESE_FLOW=true. Plugin MCPs are session-wide and accessible to all
  # skills/agents. Registering them here too would spawn duplicate processes
  # under Claude. Codex has no plugin system, so gate_unless is ignored there
  # and the entry installs normally.
  #
  # shadcn lives in the FE profile only — see claude/profiles/fe/mcp-add.json.
  # Installing user-scope loads its tool schemas in every session even though
  # shadcn is only useful for FE work.

  tilth:
    command: tilth
    args: ["--mcp", "--edit"]
    scope: user
    description: AST-aware code search/read/edit (Tree-sitter); backs cheez-* skills when cheese-flow is unavailable
    gate_unless: CHEESE_FLOW

  context7:
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    env:
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
    scope: user
    description: Library/framework docs (React, Tailwind, Next.js, …); backs /briesearch when cheese-flow is unavailable
    gate_unless: CHEESE_FLOW

  tavily:
    command: npx
    args: ["-y", "tavily-mcp@latest"]
    env:
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
    scope: user
    description: AI-powered technical web research; backs /briesearch when cheese-flow is unavailable
    gate_unless: CHEESE_FLOW

  serper:
    command: npx
    args: ["-y", "serper-search-scrape-mcp-server"]
    env:
      SERPER_API_KEY: "${SERPER_API_KEY}"
    scope: user
    description: Google SERP data via Serper.dev — web search, Knowledge Graph, People Also Ask, and page scraping

  todoist:
    command: npx
    args: ["-y", "@doist/todoist-ai"]
    env:
      TODOIST_API_KEY: "${TODOIST_API_KEY}"
    scope: user
    description: Official Todoist MCP (Doist-maintained) — invoke only when explicitly requested

  code-review-graph:
    command: uvx
    args: ["--from", "code-review-graph[embeddings]", "code-review-graph", "serve"]
    scope: user
    description: Structural code knowledge graph via Tree-sitter — semantic search (sentence-transformers), call chains, impact radius, flows, communities
