config:
  line-length: false
  no-inline-html: false
  first-line-heading: false
  table-column-style: false
  fenced-code-language: false
  no-duplicate-heading: false
  single-title: false
  no-emphasis-as-heading: false

ignores:
  # Match node_modules at any depth — skills that npm-install (e.g.
  # skills/roadmap/scripts) create nested trees the root glob misses.
  - "**/node_modules/**"
  - .worktrees/**
  - reference/**
  - tmux/plugins/**
  - vim/undo/**
  - .cheese/**
  - .context/**
  # Derived, gitignored: assembled by sync_claude_chezmoi_sources (also by the
  # test suite) from skills/ etc., which are linted at source.
  - chezmoi/dot_claude/exact_*/**
  # Cursor IDE runtime output (gitignored via /cursor/*); the only intentional
  # markdown under cursor/ is plugins/. Not ours to lint.
  - cursor/skills-cursor/**
  - cursor/extensions/**
