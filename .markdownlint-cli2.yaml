config:
  line-length: false
  no-inline-html: false
  first-line-heading: false
  table-column-style: false
  fenced-code-language: false
  no-duplicate-heading: false
  single-title: false
  no-emphasis-as-heading: false

ignores:
  - node_modules/**
  - .worktrees/**
  - reference/**
  - tmux/plugins/**
  - vim/undo/**
  - claude/hooks/node_modules/**
