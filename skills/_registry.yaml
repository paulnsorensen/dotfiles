# Skill Install Registry — source repos to sync via `npx skills add`
#
# Each entry is a GitHub repo in OWNER/REPO format. Skills are auto-discovered
# by the `skills` CLI (`--skill '*'`) from `skills/<name>/SKILL.md` per the
# agentskills.io specification.
#
# Optional fields:
#   skills:  explicit list of skill names (passed as repeated --skill; else '*')
#   pin:     git branch or tag (appended as <repo>@<ref> → `git clone --branch`;
#            commit SHAs are NOT supported by the clone-based fetch)
#
# Installs always run with --copy (overwrite); the source repo is shallow-cloned
# once per entry and copied into every configured harness in one invocation.
#
# Harnesses are configured in .env via SKILL_HARNESSES (space-separated).
#
# Usage:
#   skill-sync           Install/update all skills for each configured harness
#   skill-ls             List installed global skills (npx skills list --global)

sources:
  paulnsorensen/easy-cheese:
    description: Portable agent skills toolkit — mold, cook, press, age, cure, melt, plus cheez-* tilth-backed code intelligence
  tavily-ai/skills:
    description: Official Tavily skills — search, extract, crawl, map, research, dynamic-search, plus tavily-cli and best-practices
  # NOTE: paulnsorensen/skillz-that-grillz was restructured into a Claude plugin
  # marketplace (.claude-plugin/marketplace.json; skills nested under
  # plugins/*/skills/). It no longer fits the flat skills/<name>/ convention this
  # registry installs via `npx skills add`. Consume it through the plugin
  # registry instead, not here.
