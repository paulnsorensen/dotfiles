# Pre-commit hooks managed by prek (Rust-powered pre-commit)
# https://prek.j178.dev/

# Built-in hooks (Rust-native, fast)
[[repos]]
repo = "builtin"
hooks = [
  # Golden fixtures are byte-exact expected renderer output (compared with `==`),
  # so they must never be auto-normalized — e.g. bare-agent.md legitimately ends
  # in `---\n\n`, which end-of-file-fixer would otherwise collapse to `---\n`.
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"], exclude = "vimrc|agent-profile/tests/fixtures/golden/" },
  { id = "end-of-file-fixer", exclude = "agent-profile/tests/fixtures/golden/" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key", exclude = "tests/" },
  { id = "check-added-large-files", args = ["--maxkb=1024"] },
]

# Shellcheck for shell scripts (use system binary, not shellcheck-py which triggers uv panic)
[[repos]]
repo = "local"
hooks = [
  { id = "shellcheck", name = "shellcheck", entry = "shellcheck -e SC1091,SC2148,SC2030,SC2031,SC2155,SC2314,SC2329", language = "system", types = ["shell"], exclude = "zsh/" },
]

# Local hooks
[[repos]]
repo = "local"
hooks = [
  # settings.json migrated from a claude/.sync symlink to a chezmoi `create_`
  # seed (chezmoi/dot_claude/create_settings.json) — the live ~/.claude/settings.json
  # is now a real file populated by chezmoi + mutated by ap install global.
  # The hook accepts either a real file (post-migration) or the legacy
  # symlink (in case someone's still on the old setup mid-bisect).
  { id = "check-claude-sync", name = "Check Claude config synced", entry = "bash -c '[[ -f ~/.claude/settings.json ]] || { echo \"Claude settings not synced. Run: dots sync\"; exit 1; }'", language = "system", always_run = true, pass_filenames = false },
  { id = "check-claude-settings-schema", name = "Validate Claude settings schema", entry = "bash -c 'check-jsonschema --no-cache --schemafile https://json.schemastore.org/claude-code-settings.json chezmoi/dot_claude/create_settings.json'", language = "system", files = "^chezmoi/dot_claude/create_settings\\.json$", pass_filenames = false },
]
