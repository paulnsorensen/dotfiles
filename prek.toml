# Pre-commit hooks managed by prek (Rust-powered pre-commit)
# https://prek.j178.dev/

# Built-in hooks (Rust-native, fast)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"], exclude = "vimrc" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key", exclude = "tests/" },
  { id = "check-added-large-files", args = ["--maxkb=1024"] },
]

# Shellcheck for shell scripts (use system binary, not shellcheck-py which triggers uv panic)
[[repos]]
repo = "local"
hooks = [
  { id = "shellcheck", name = "shellcheck", entry = "shellcheck -e SC1091,SC2148,SC2030,SC2031,SC2155,SC2314,SC2329", language = "system", types = ["shell"], exclude = "zsh/" },
]

# Local hooks
[[repos]]
repo = "local"
hooks = [
  { id = "check-claude-sync", name = "Check Claude config synced", entry = "bash -c 'target=$(readlink ~/.claude/settings.json 2>/dev/null) && [[ \"$target\" == */claude/settings.json ]] || { echo \"Claude config not synced. Run: dots sync\"; exit 1; }'", language = "system", always_run = true, pass_filenames = false },
  { id = "check-claude-settings-schema", name = "Validate Claude settings schema", entry = "bash -c 'check-jsonschema --schemafile https://json.schemastore.org/claude-code-settings.json claude/settings.json'", language = "system", files = "claude/settings\\.json$", pass_filenames = false },
]
