# Pre-commit hooks managed by prek (Rust-powered pre-commit)
# https://prek.j178.dev/

# Built-in hooks (Rust-native, fast)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key", exclude = "tests/" },
  { id = "check-added-large-files", args = ["--maxkb=1024"] },
]

# Shellcheck for shell scripts
[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.10.0.1"
hooks = [
  { id = "shellcheck", args = ["-e", "SC1091,SC2148"] },
]

# Local hooks
[[repos]]
repo = "local"
hooks = [
  { id = "check-claude-sync", name = "Check Claude config synced", entry = "bash -c 'target=$(readlink ~/.claude/settings.json 2>/dev/null) && [[ \"$target\" == *Dev/dotfiles/claude/settings.json ]] || { echo \"Claude config not synced. Run: dots sync\"; exit 1; }'", language = "system", always_run = true, pass_filenames = false },
]
